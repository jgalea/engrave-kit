<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>engrave-kit — copperplate charts for React</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f7f5f0;
    color: #1b1a17;
    font: 15px/1.55 "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    padding: 44px 28px 72px;
  }
  header { max-width: 1160px; margin: 0 auto 30px; }
  h1 { font-size: 30px; letter-spacing: -0.01em; margin-bottom: 6px; }
  .sub { color: #6a665c; max-width: 64ch; }
  .grid {
    max-width: 1160px; margin: 0 auto;
    display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 22px;
  }
  .card {
    background: #fffdf9;
    border: 1px solid #e4dfd2;
    border-radius: 10px;
    padding: 18px 18px 16px;
  }
  .card h2 {
    font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    color: #57534a; margin-bottom: 4px;
  }
  .note { font-size: 12.5px; color: #7d786c; margin-bottom: 14px; max-width: 54ch; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

  /* engrave-kit's Legend/Tooltip are styled with Tailwind utilities. This page is
     plain HTML, so it defines the handful it needs. The chart geometry itself no
     longer depends on them. */
  .flex { display: flex } .inline-flex { display: inline-flex }
  .flex-wrap { flex-wrap: wrap } .items-center { align-items: center }
  .justify-end { justify-content: flex-end }
  .gap-3 { gap: .75rem } .gap-1\.5 { gap: .375rem }
  .inline-block { display: inline-block }
  .h-2 { height: .5rem } .w-2 { width: .5rem }
  .rounded-full { border-radius: 9999px }
  .pointer-events-none { pointer-events: none }
  .absolute { position: absolute } .relative { position: relative }
  .inset-0 { inset: 0 } .h-full { height: 100% } .w-full { width: 100% }
  .block { display: block } .overflow-visible { overflow: visible }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="./demo.js"></script>
</body>
</html>
